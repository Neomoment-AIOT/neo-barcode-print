<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Printer</title>
<link rel="stylesheet" href="styles.css">
<style>
  /* Toggle Switch */
  .toggle-container {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 40px;
    background: #ccc;
    border-radius: 20px;
    padding: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
  }
  .toggle-circle {
    width: 32px;
    height: 32px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="public/static/logo.jpg" alt="Logo" class="logo" onerror="this.src='logo.jpg';">
        <h1 id="title">Barcode Printer</h1>
        <small id="build-timestamp" class="timestamp">Build: 2025-07-22 15:51</small>
    </div>  

    <!-- ✅ Language Toggle -->
    <div class="toggle-container" id="langToggle">
      <div class="toggle-circle" id="toggleCircle">EN</div>
    </div>

    <div class="next-counter">
        <span id="next-queue-label">Next Queue Number: </span>
        <span id="next-queue-number">Loading...</span>
    </div>
    <div class="form-group">
        <label id="iqama-label" for="iqama">Iqama ID#:</label>
        <input type="text" id="iqama" placeholder="Enter Iqama ID" required>
    </div>
    <div class="form-group">
        <label id="prescription-label" for="prescription">Prescription #:</label>
        <input type="text" id="prescription" placeholder="Enter Prescription #" required>
    </div>
    <div class="button-group">
        <button id="printBtn">Print Barcode</button>
        <button id="pdfBtn" class="pdf-button">Print Barcode (57mm x 80mm)</button>
        <button id="clearBtn" class="clear-button">Clear</button>
    </div>
</div>
<script>
  const langToggle = document.getElementById("langToggle");
  const toggleCircle = document.getElementById("toggleCircle");

  let language = "en";

  const translations = {
    en: {
      title: "Barcode Printer",
      nextQueue: "Next Queue Number: ",
      iqama: "Iqama ID#:",
      iqamaPlaceholder: "Enter Iqama ID",
      prescription: "Prescription #:",
      prescriptionPlaceholder: "Enter Prescription #",
      print: "Print Barcode",
      printPDF: "Print Barcode (57mm x 80mm)",
      clear: "Clear",
      build: "Build: 2025-07-22 15:51",
      loading: "Loading..."
    },
    ar: {
      title: "طابعة الباركود",
      nextQueue: "رقم الدور التالي: ",
      iqama: "رقم الإقامة#:",
      iqamaPlaceholder: "أدخل رقم الإقامة",
      prescription: "رقم الوصفة #:",
      prescriptionPlaceholder: "أدخل رقم الوصفة",
      print: "طباعة الباركود",
      printPDF: "طباعة الباركود (57مم × 80مم)",
      clear: "مسح",
      build: "بناء: 2025-07-22 15:51",
      loading: "جار التحميل..."
    }
  };

  function updateText() {
    document.getElementById("title").innerText = translations[language].title;
    document.getElementById("next-queue-label").innerText = translations[language].nextQueue;
    document.getElementById("iqama-label").innerText = translations[language].iqama;
    document.getElementById("iqama").placeholder = translations[language].iqamaPlaceholder;
    document.getElementById("prescription-label").innerText = translations[language].prescription;
    document.getElementById("prescription").placeholder = translations[language].prescriptionPlaceholder;
    document.getElementById("printBtn").innerText = translations[language].print;
    document.getElementById("pdfBtn").innerText = translations[language].printPDF;
    document.getElementById("clearBtn").innerText = translations[language].clear;
    document.getElementById("build-timestamp").innerText = translations[language].build;
    document.getElementById("next-queue-number").innerText = translations[language].loading;
  }

  langToggle.addEventListener("click", () => {
    language = language === "en" ? "ar" : "en";
    toggleCircle.style.transform = language === "ar" ? "translateX(40px)" : "translateX(0)";
    toggleCircle.innerText = language === "en" ? "EN" : "ع";
    updateText();
  });

  updateText(); // initialize
</script>


</body>
</html>
